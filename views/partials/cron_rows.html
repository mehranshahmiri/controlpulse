{{ range .Jobs }}
<tr class="border-b border-slate-50 hover:bg-slate-50/50 transition group">
    <td class="px-6 py-4 font-mono font-medium text-vn-primary text-sm">
        <span class="bg-orange-50 px-2 py-1 rounded border border-orange-100">{{ .Schedule }}</span>
    </td>
    <td class="px-6 py-4 font-mono text-slate-600 text-sm truncate max-w-md">
        {{ .Command }}
    </td>
    <td class="px-6 py-4 text-right">
        <button hx-post="/api/cron/delete?id={{ .ID }}" 
                hx-confirm="Delete this task?"
                hx-target="#cron-list"
                hx-swap="innerHTML"
                class="text-slate-400 hover:text-red-600 p-2 rounded-lg hover:bg-red-50 transition" title="Delete">
            <i class="ph ph-trash text-lg"></i>
        </button>
    </td>
</tr>
{{ else }}
<tr>
    <td colspan="3" class="px-6 py-12 text-center text-slate-400">
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center mb-3 text-slate-400">
                <i class="ph ph-clock text-2xl"></i>
            </div>
            <p>No scheduled tasks found.</p>
        </div>
    </td>
</tr>
{{ end }}
