<ul class="pl-3 space-y-0.5 border-l border-vn-border ml-2">
    {{ range .Entries }}
        {{ if .IsDir }}
        <li>
            <!-- Folder Row -->
            <div class="cursor-pointer text-vn-dark hover:text-vn-primary hover:bg-white rounded-lg px-2 py-1.5 flex items-center transition-all text-xs font-medium group select-none"
                 onclick="setContext('{{ .Path }}')"
                 hx-get="/api/files/tree?path={{ .Path }}"
                 hx-swap="innerHTML"
                 hx-target="next .folder-contents">
                 <!-- Distinct Yellow Folder Icon -->
                 <i class="ph ph-folder-simple-fill text-yellow-400 text-lg mr-2 transition-colors"></i> 
                 <span class="truncate">{{ .Name }}</span>
            </div>
            <!-- Container for Children (Prevents Duplication) -->
            <div class="folder-contents"></div>
        </li>
        {{ else }}
        <li>
            <!-- File Row -->
            <div class="cursor-pointer text-gray-500 hover:text-vn-dark hover:bg-white rounded-lg px-2 py-1.5 flex items-center transition-all text-xs group select-none"
                 onclick="loadFile('{{ .Path }}', '{{ $.Parent }}')">
                 <!-- Distinct Blue/Gray File Icon -->
                 <i class="ph ph-file-text text-blue-300 group-hover:text-vn-secondary text-lg mr-2 transition-colors"></i> 
                 <span class="truncate">{{ .Name }}</span>
                 <span class="ml-auto text-[10px] text-gray-300 group-hover:text-gray-400 font-mono">{{ .Size }}</span>
            </div>
        </li>
        {{ end }}
    {{ end }}
</ul>
