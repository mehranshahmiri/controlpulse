<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Env Manager</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/public/favicon.ico">

    <!-- Error Handler -->
    <script>
        window.onerror = function(msg, url, line, col, error) {
            const root = document.getElementById('root');
            if(root) {
                root.innerHTML = `
                    <div style="padding: 2rem; color: #EF4444; font-family: monospace; background: #FEF2F2; height: 100vh;">
                        <h3 style="font-weight: bold; margin-bottom: 1rem;">Application Error</h3>
                        <p style="margin-bottom: 0.5rem;">${msg}</p>
                        <p style="color: #666; font-size: 0.875rem;">Line: ${line}</p>
                    </div>
                `;
            }
            return false;
        };
    </script>

    <!-- Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Import Map -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0?dev",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?dev",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
    </script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Inter"', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    colors: {
                        vn: {
                            primary: '#F92C15', // ControlPulse Orange
                            primaryHover: '#C5240F', // Darker Orange
                            secondary: '#007AFF', // Blue
                            dark: '#1D1D1F',    // Apple Dark
                            text: '#1D1D1F',    // Text Dark
                            textMuted: '#6E6E73', // Gray Text
                            bg: '#F5F5F7',    // Background
                            surface: '#ffffff',
                            border: '#E5E5EA', // Border
                            success: '#34C759',
                            danger: '#FF3B30',
                            warning: '#FF9500'
                        }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'medium': '0 4px 20px rgba(0,0,0,0.06)',
                        'glow': '0 0 15px rgba(249, 44, 21, 0.3)',
                    },
                    borderRadius: { 'xl': '1rem', '2xl': '1.5rem' }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #F5F5F7;
            color: #1D1D1F; 
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #C7C7CC; border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: #AEAEB2; }

        .glass-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(229, 229, 234, 0.6);
        }

        /* Sidebar Item Styles matching main.html */
        .sidebar-item { 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            color: #6E6E73; 
            font-weight: 500; 
            font-size: 0.875rem; 
            border-radius: 0.75rem; 
            padding: 0.625rem 1rem; 
            display: flex; 
            align-items: center; 
            gap: 0.75rem; 
            margin: 0 0.75rem; 
            text-decoration: none;
        }
        .sidebar-item:hover { 
            background: #F2F2F7; 
            color: #1D1D1F; 
            transform: translateX(2px); 
        }
        .sidebar-item.active { 
            background: #FEF2F0; 
            color: #F92C15; 
            font-weight: 600; 
        }
        .sidebar-item svg { width: 1.25rem; height: 1.25rem; }
    </style>
</head>
<body class="h-screen overflow-hidden">
    <div id="root" class="h-full"></div>

    <script type="text/babel" data-type="module" data-presets="react">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Plus, Trash2, Eye, EyeOff, Copy, Download, FolderPlus, 
            Settings, Search, Check, X, Shield, FileJson, FileUp, 
            Files, Dices, Upload, LayoutGrid, Globe, FolderOpen, 
            Clock, Database, Terminal, ShieldCheck, DownloadCloud, 
            Sliders, Siren, LogOut, Box, ChevronRight, Key, Lock
        } from 'lucide-react';

        const generateId = () => Math.random().toString(36).substr(2, 9);

        const generateRandomSecret = (length = 32) => {
            const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
            let retVal = "";
            for (let i = 0, n = charset.length; i < length; ++i) {
                retVal += charset.charAt(Math.floor(Math.random() * n));
            }
            return retVal;
        };

        // --- Main Navigation (Matches views/main.html) ---
        const MainNavigation = () => (
            <aside className="w-72 bg-white border-r border-vn-border flex flex-col z-30 hidden md:flex shrink-0">
                <div className="h-24 flex items-center justify-center border-b border-vn-border/50">
                    <img src="/public/controlpulse-logo.png" alt="ControlPulse Logo" className="h-10 w-auto object-contain" />
                </div>

                <nav className="flex-1 py-6 space-y-1 overflow-y-auto custom-scrollbar">
                    <p className="px-7 text-[10px] font-bold text-vn-textMuted uppercase tracking-widest mb-3">General</p>
                    <a href="/" className="sidebar-item"><LayoutGrid /> Overview</a>
                    <a href="/sites" className="sidebar-item"><Globe /> Domains</a>

                    <p className="px-7 text-[10px] font-bold text-vn-textMuted uppercase tracking-widest mt-8 mb-3">Apps & Data</p>
                    <a href="/blueprints" className="sidebar-item"><DownloadCloud /> App Store</a>
                    <a href="/files" className="sidebar-item"><FolderOpen /> File Manager</a>
                    <a href="/database" className="sidebar-item"><Database /> Database</a>

                    <p className="px-7 text-[10px] font-bold text-vn-textMuted uppercase tracking-widest mt-8 mb-3">Security</p>
                    <a href="/firewall" className="sidebar-item"><ShieldCheck /> Firewall</a>
                    <a href="/env" className="sidebar-item active"><Shield /> Env Manager</a>
                    <a href="/fail2ban" className="sidebar-item"><Siren /> Fail2Ban</a>

                    <p className="px-7 text-[10px] font-bold text-vn-textMuted uppercase tracking-widest mt-8 mb-3">System</p>
                    <a href="/cron" className="sidebar-item"><Clock /> Scheduler</a>
                    <a href="/logs" className="sidebar-item"><Terminal /> System Logs</a>
                    <a href="/terminal" target="_blank" className="sidebar-item"><Terminal /> Terminal</a>
                    <a href="/updates" className="sidebar-item"><DownloadCloud /> Updates</a>
                    <a href="/settings" className="sidebar-item"><Sliders /> Settings</a>
                </nav>

                <div className="p-6 border-t border-vn-border">
                    <div className="bg-vn-bg rounded-xl p-3 border border-vn-border flex items-center gap-3">
                        <div className="w-8 h-8 rounded-full bg-orange-100 flex items-center justify-center text-vn-primary font-bold text-xs">A</div>
                        <div className="overflow-hidden">
                            <p class="text-xs font-semibold text-vn-text truncate">System Admin</p>
                            <p class="text-[10px] text-vn-textMuted truncate">admin@server</p>
                        </div>
                        <a href="/logout" className="ml-auto text-vn-textMuted hover:text-vn-danger transition-colors" title="Logout">
                            <LogOut size={18} />
                        </a>
                    </div>
                    <div className="mt-4 text-center space-y-1">
                        <p className="text-[10px] text-vn-textMuted">Made by <a href="https://mehranshahmiri.com" target="_blank" className="font-bold hover:text-vn-primary transition">Mehran Shahmiri</a>, Powered by <a href="https://openloop.in" target="_blank" className="font-bold hover:text-vn-primary transition">OpenLoop</a></p>
                    </div>
                </div>
            </aside>
        );

        // --- Main Component ---
        function EnvironmentManager() {
            // State
            const [environments, setEnvironments] = useState([]);
            const [activeEnvId, setActiveEnvId] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            
            // UI States
            const [isAddingEnv, setIsAddingEnv] = useState(false);
            const [newEnvName, setNewEnvName] = useState('');
            const [newSecretKey, setNewSecretKey] = useState('');
            const [newSecretValue, setNewSecretValue] = useState('');
            const [isImportModalOpen, setIsImportModalOpen] = useState(false);
            const [importContent, setImportContent] = useState('');
            const [toast, setToast] = useState(null);

            // Load Data
            useEffect(() => {
                const saved = localStorage.getItem('env-manager-data');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        setEnvironments(parsed);
                        if (parsed.length > 0) setActiveEnvId(parsed[0].id);
                    } catch (e) { console.error(e); }
                } else {
                    const defaultEnv = {
                        id: generateId(),
                        name: 'Production',
                        color: 'bg-green-500',
                        secrets: [
                            { id: generateId(), key: 'API_URL', value: 'https://api.example.com', isVisible: true },
                            { id: generateId(), key: 'DB_PASSWORD', value: 'secret_prod_password_123', isVisible: false },
                        ]
                    };
                    setEnvironments([defaultEnv]);
                    setActiveEnvId(defaultEnv.id);
                }
            }, []);

            // Save Data
            useEffect(() => {
                if (environments.length > 0) {
                    localStorage.setItem('env-manager-data', JSON.stringify(environments));
                }
            }, [environments]);

            // Toast Logic
            useEffect(() => {
                if (toast) {
                    const timer = setTimeout(() => setToast(null), 3000);
                    return () => clearTimeout(timer);
                }
            }, [toast]);

            const showToast = (msg, type = 'success') => setToast({ msg, type });

            // Actions
            const handleAddEnvironment = () => {
                if (!newEnvName.trim()) return;
                const newEnv = {
                    id: generateId(),
                    name: newEnvName,
                    secrets: [],
                    color: 'bg-red-500' 
                };
                setEnvironments([...environments, newEnv]);
                setActiveEnvId(newEnv.id);
                setNewEnvName('');
                setIsAddingEnv(false);
                showToast(`Environment "${newEnvName}" created`);
            };

            const handleDeleteEnvironment = (id, e) => {
                e.stopPropagation();
                if (environments.length <= 1) {
                    showToast("Cannot delete the last environment", "error");
                    return;
                }
                if (window.confirm('Delete this environment?')) {
                    const newEnvs = environments.filter(env => env.id !== id);
                    setEnvironments(newEnvs);
                    if (activeEnvId === id) setActiveEnvId(newEnvs[0].id);
                    showToast("Environment deleted");
                }
            };

            const handleCloneEnvironment = (id, e) => {
                e.stopPropagation();
                const envToClone = environments.find(env => env.id === id);
                if (!envToClone) return;
                const newEnv = {
                    ...envToClone,
                    id: generateId(),
                    name: `${envToClone.name} (Copy)`,
                    secrets: envToClone.secrets.map(s => ({...s, id: generateId()}))
                };
                setEnvironments([...environments, newEnv]);
                setActiveEnvId(newEnv.id);
                showToast(`Cloned ${envToClone.name}`);
            };

            const handleAddSecret = () => {
                if (!activeEnvId || !newSecretKey.trim()) return;
                setEnvironments(envs => envs.map(env => {
                    if (env.id === activeEnvId) {
                        if (env.secrets.some(s => s.key === newSecretKey)) {
                            showToast(`Key "${newSecretKey}" already exists`, "error");
                            return env;
                        }
                        return {
                            ...env,
                            secrets: [...env.secrets, { 
                                id: generateId(), 
                                key: newSecretKey.toUpperCase().replace(/\s+/g, '_'), 
                                value: newSecretValue, 
                                isVisible: false 
                            }]
                        };
                    }
                    return env;
                }));
                setNewSecretKey('');
                setNewSecretValue('');
                showToast("Secret added");
            };

            const handleDeleteSecret = (secretId) => {
                setEnvironments(envs => envs.map(env => {
                    if (env.id === activeEnvId) {
                        return { ...env, secrets: env.secrets.filter(s => s.id !== secretId) };
                    }
                    return env;
                }));
                showToast("Secret deleted");
            };

            const handleUpdateSecret = (secretId, field, newValue) => {
                setEnvironments(envs => envs.map(env => {
                    if (env.id === activeEnvId) {
                        return {
                            ...env,
                            secrets: env.secrets.map(s => {
                                if (s.id === secretId) return { ...s, [field]: newValue };
                                return s;
                            })
                        };
                    }
                    return env;
                }));
            };

            const toggleSecretVisibility = (secretId) => {
                setEnvironments(envs => envs.map(env => {
                    if (env.id === activeEnvId) {
                        return {
                            ...env,
                            secrets: env.secrets.map(s => 
                                s.id === secretId ? { ...s, isVisible: !s.isVisible } : s
                            )
                        };
                    }
                    return env;
                }));
            };

            const handleGenerateValue = () => setNewSecretValue(generateRandomSecret(40));
            
            const copyToClipboard = (text) => {
                navigator.clipboard.writeText(text);
                showToast("Copied!");
            };

            const getEnvFileContent = (env) => env.secrets.map(s => `${s.key}=${s.value}`).join('\n');

            const downloadEnvFile = () => {
                const activeEnv = environments.find(e => e.id === activeEnvId);
                if (!activeEnv) return;
                const content = getEnvFileContent(activeEnv);
                const blob = new Blob([content], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${activeEnv.name.toLowerCase().replace(/\s+/g, '-')}.env`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast("Download started");
            };

            const copyAsJson = () => {
                const activeEnv = environments.find(e => e.id === activeEnvId);
                if (!activeEnv) return;
                const obj = activeEnv.secrets.reduce((acc, curr) => ({...acc, [curr.key]: curr.value}), {});
                copyToClipboard(JSON.stringify(obj, null, 2));
            };

            const handleImportSubmit = () => {
                if (!activeEnvId) return;
                const lines = importContent.split('\n');
                const newSecrets = [];
                lines.forEach(line => {
                    const trimmed = line.trim();
                    if (!trimmed || trimmed.startsWith('#')) return;
                    const idx = trimmed.indexOf('=');
                    if (idx === -1) return;
                    const key = trimmed.substring(0, idx).trim();
                    const value = trimmed.substring(idx + 1).trim();
                    if (key) {
                        newSecrets.push({
                            id: generateId(),
                            key: key.toUpperCase().replace(/\s+/g, '_'),
                            value: value.replace(/^["'](.*)["']$/, '$1'),
                            isVisible: false
                        });
                    }
                });
                if (newSecrets.length === 0) {
                    showToast("No valid secrets found", "error");
                    return;
                }
                setEnvironments(envs => envs.map(env => {
                    if (env.id === activeEnvId) {
                        const existingKeys = new Set(env.secrets.map(s => s.key));
                        const filteredNew = newSecrets.filter(s => !existingKeys.has(s.key));
                        return { ...env, secrets: [...env.secrets, ...filteredNew] };
                    }
                    return env;
                }));
                setIsImportModalOpen(false);
                setImportContent('');
                showToast(`Imported ${newSecrets.length} secrets`);
            };

            const activeEnv = environments.find(e => e.id === activeEnvId);
            const filteredSecrets = activeEnv?.secrets.filter(s => 
                s.key.toLowerCase().includes(searchQuery.toLowerCase()) || 
                s.value.toLowerCase().includes(searchQuery.toLowerCase())
            ) || [];

            return (
                <div className="flex h-screen bg-vn-bg text-vn-text overflow-hidden relative">
                    
                    <MainNavigation />

                    {/* Environment Sidebar */}
                    <div className={`${isSidebarOpen ? 'w-80' : 'w-0'} transition-all duration-300 bg-white border-r border-vn-border flex flex-col z-20 shrink-0`}>
                        <div className="h-24 flex items-center justify-between px-6 border-b border-vn-border">
                            <h2 className="text-xs font-bold text-vn-textMuted uppercase tracking-widest">Environments</h2>
                            <span className="bg-vn-bg text-vn-textMuted text-[10px] font-bold px-2 py-0.5 rounded-full border border-vn-border">{environments.length}</span>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 space-y-2">
                            {environments.map(env => (
                                <div 
                                    key={env.id}
                                    onClick={() => setActiveEnvId(env.id)}
                                    className={`group flex items-center justify-between px-4 py-3 rounded-xl cursor-pointer transition-all duration-200 ${
                                        activeEnvId === env.id 
                                        ? 'bg-orange-50 border border-orange-100 shadow-sm' 
                                        : 'hover:bg-gray-50 border border-transparent'
                                    }`}
                                >
                                    <div className="flex items-center gap-3 overflow-hidden">
                                        <div className={`w-2.5 h-2.5 rounded-full ${env.color} shadow-sm`} />
                                        <span className={`text-sm ${activeEnvId === env.id ? 'font-semibold text-vn-primary' : 'text-gray-600'}`}>{env.name}</span>
                                    </div>
                                    <div className="flex items-center opacity-0 group-hover:opacity-100 transition-opacity gap-1">
                                        <button onClick={(e) => handleCloneEnvironment(env.id, e)} className="p-1.5 hover:bg-white rounded-md text-gray-400 hover:text-vn-primary transition-colors hover:shadow-sm" title="Clone"><Files className="w-3.5 h-3.5" /></button>
                                        {environments.length > 1 && (
                                            <button onClick={(e) => handleDeleteEnvironment(env.id, e)} className="p-1.5 hover:bg-white rounded-md text-gray-400 hover:text-vn-danger transition-colors hover:shadow-sm" title="Delete"><Trash2 className="w-3.5 h-3.5" /></button>
                                        )}
                                    </div>
                                </div>
                            ))}

                            {isAddingEnv ? (
                                <div className="p-3 bg-gray-50 border border-gray-100 rounded-xl animate-in fade-in slide-in-from-top-2 mt-4 shadow-inner">
                                    <input 
                                        autoFocus 
                                        type="text" 
                                        placeholder="Env Name (e.g. Staging)" 
                                        className="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-vn-primary focus:ring-2 focus:ring-red-100 transition-all mb-2" 
                                        value={newEnvName} 
                                        onChange={(e) => setNewEnvName(e.target.value)} 
                                        onKeyDown={(e) => e.key === 'Enter' && handleAddEnvironment()} 
                                    />
                                    <div className="flex gap-2">
                                        <button onClick={handleAddEnvironment} className="flex-1 bg-vn-primary hover:bg-vn-primaryHover text-xs py-2 rounded-lg text-white font-medium transition-colors shadow-sm">Create</button>
                                        <button onClick={() => setIsAddingEnv(false)} className="flex-1 bg-white border border-gray-200 hover:bg-gray-50 text-xs py-2 rounded-lg text-gray-500 transition-colors shadow-sm">Cancel</button>
                                    </div>
                                </div>
                            ) : (
                                <button 
                                    onClick={() => setIsAddingEnv(true)} 
                                    className="w-full flex items-center justify-center gap-2 px-4 py-3 text-gray-500 hover:text-vn-primary hover:bg-gray-50 rounded-xl transition-all text-sm mt-2 border border-dashed border-gray-200 hover:border-orange-200"
                                >
                                    <FolderPlus className="w-4 h-4" />
                                    <span>New Environment</span>
                                </button>
                            )}
                        </div>
                    </div>

                    {/* Main Content Area */}
                    <div className="flex-1 flex flex-col min-w-0 bg-vn-bg">
                        {/* Header */}
                        <header className="h-24 glass-header flex items-center justify-between px-8 sticky top-0 z-10 flex-shrink-0">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="text-gray-400 hover:text-vn-text transition-colors p-2 hover:bg-white rounded-lg"><LayoutGrid className="w-5 h-5" /></button>
                                <div>
                                    <h2 className="text-xl font-bold text-vn-text tracking-tight flex items-center gap-2">
                                        {activeEnv?.name || 'Select Environment'}
                                        {activeEnv && <span className="bg-orange-50 text-vn-primary text-[10px] px-2 py-0.5 rounded-full uppercase tracking-wider font-bold border border-orange-100">Active</span>}
                                    </h2>
                                    <p class="text-xs text-vn-textMuted mt-0.5">Securely manage environment variables and secrets.</p>
                                </div>
                            </div>

                            <div className="flex items-center gap-3">
                                <div className="flex bg-white rounded-xl p-1 border border-vn-border shadow-sm">
                                    <button onClick={() => setIsImportModalOpen(true)} className="p-2 text-gray-500 hover:text-vn-primary hover:bg-red-50 rounded-lg transition-all" title="Import"><FileUp className="w-4 h-4" /></button>
                                    <button onClick={copyAsJson} className="p-2 text-gray-500 hover:text-vn-primary hover:bg-red-50 rounded-lg transition-all" title="Copy JSON"><FileJson className="w-4 h-4" /></button>
                                    <button onClick={() => activeEnv && copyToClipboard(getEnvFileContent(activeEnv))} className="p-2 text-gray-500 hover:text-vn-primary hover:bg-red-50 rounded-lg transition-all" title="Copy .env"><Copy className="w-4 h-4" /></button>
                                </div>
                                <button onClick={downloadEnvFile} className="flex items-center gap-2 bg-vn-primary hover:bg-vn-primaryHover text-white px-5 py-2.5 rounded-xl shadow-lg shadow-orange-200 hover:shadow-xl transition-all text-sm font-medium">
                                    <Download className="w-4 h-4" /> Download .env
                                </button>
                            </div>
                        </header>

                        {/* Content Scroll Area */}
                        <div className="flex-1 overflow-y-auto p-8 custom-scrollbar">
                            <div className="max-w-5xl mx-auto w-full space-y-8">
                                
                                {/* Top Toolbar */}
                                <div className="flex flex-col md:flex-row gap-4 justify-between items-center">
                                    <div className="relative w-full md:w-96 group">
                                        <Search className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 group-focus-within:text-vn-primary transition-colors" />
                                        <input 
                                            type="text" 
                                            placeholder="Search secrets..." 
                                            className="w-full bg-white border border-gray-200 rounded-xl pl-11 pr-4 py-3 text-sm focus:outline-none focus:border-vn-primary focus:ring-4 focus:ring-red-50 transition-all shadow-sm group-hover:shadow-md" 
                                            value={searchQuery} 
                                            onChange={(e) => setSearchQuery(e.target.value)} 
                                        />
                                    </div>
                                    <div className="text-xs text-gray-400 font-medium">
                                        {filteredSecrets.length} secrets found
                                    </div>
                                </div>

                                {/* Add New Secret Card */}
                                <div className="bg-white border border-gray-200/60 rounded-2xl p-6 shadow-medium hover:shadow-lg transition-all duration-300 transform hover:-translate-y-0.5">
                                    <h3 className="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                                        <Plus className="w-4 h-4" /> Add New Variable
                                    </h3>
                                    <div className="flex flex-col md:flex-row gap-4 items-end">
                                        <div className="flex-1 w-full space-y-1.5">
                                            <label className="text-[11px] font-bold text-gray-500 uppercase">Key</label>
                                            <div className="relative">
                                                <Key className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" />
                                                <input 
                                                    type="text" 
                                                    placeholder="API_KEY" 
                                                    className="w-full bg-gray-50 border border-gray-200 rounded-xl pl-10 pr-4 py-2.5 text-sm font-mono focus:bg-white focus:outline-none focus:border-vn-primary focus:ring-2 focus:ring-red-50 transition-all placeholder:text-gray-400 text-vn-text" 
                                                    value={newSecretKey} 
                                                    onChange={(e) => setNewSecretKey(e.target.value)} 
                                                    onKeyDown={(e) => e.key === 'Enter' && handleAddSecret()} 
                                                />
                                            </div>
                                        </div>
                                        <div className="flex-[1.5] w-full space-y-1.5">
                                            <label className="text-[11px] font-bold text-gray-500 uppercase">Value</label>
                                            <div className="relative">
                                                <Lock className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" />
                                                <input 
                                                    type="text" 
                                                    placeholder="Value..." 
                                                    className="w-full bg-gray-50 border border-gray-200 rounded-xl pl-10 pr-10 py-2.5 text-sm font-mono focus:bg-white focus:outline-none focus:border-vn-primary focus:ring-2 focus:ring-red-50 transition-all placeholder:text-gray-400 text-vn-text" 
                                                    value={newSecretValue} 
                                                    onChange={(e) => setNewSecretValue(e.target.value)} 
                                                    onKeyDown={(e) => e.key === 'Enter' && handleAddSecret()} 
                                                />
                                                <button onClick={handleGenerateValue} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-vn-primary transition-colors" title="Generate Random"><Dices className="w-4 h-4" /></button>
                                            </div>
                                        </div>
                                        <button onClick={handleAddSecret} className="w-full md:w-auto bg-vn-primary hover:bg-vn-primaryHover text-white px-6 py-2.5 rounded-xl shadow-lg shadow-orange-100 transition-all font-medium flex items-center justify-center gap-2">
                                            Add <ChevronRight className="w-4 h-4" />
                                        </button>
                                    </div>
                                </div>

                                {/* Secrets List */}
                                <div className="space-y-4">
                                    {filteredSecrets.length === 0 ? (
                                        <div className="text-center py-24 border-2 border-dashed border-gray-200 rounded-3xl bg-gray-50/50">
                                            <div className="w-16 h-16 bg-white rounded-2xl shadow-sm border border-gray-100 flex items-center justify-center mx-auto mb-4">
                                                <Search className="w-8 h-8 text-gray-300" />
                                            </div>
                                            <p className="text-vn-dark font-medium">No secrets found</p>
                                            <p className="text-gray-500 text-sm mt-1">Try a different search or add a new variable.</p>
                                        </div>
                                    ) : (
                                        filteredSecrets.map(secret => (
                                            <div key={secret.id} className="group bg-white border border-gray-100 rounded-xl p-4 shadow-sm hover:shadow-md hover:border-orange-100 transition-all duration-300 flex flex-col md:flex-row md:items-center gap-4">
                                                
                                                <div className="flex-1 min-w-[200px] relative">
                                                    <label className="text-[10px] font-bold text-gray-400 uppercase absolute -top-2 left-2 bg-white px-1">Key</label>
                                                    <input 
                                                        className="w-full bg-transparent border-none p-0 text-vn-primary font-mono font-medium focus:ring-0 text-sm" 
                                                        value={secret.key} 
                                                        onChange={(e) => handleUpdateSecret(secret.id, 'key', e.target.value)} 
                                                    />
                                                </div>

                                                <div className="hidden md:block w-px h-8 bg-gray-100"></div>

                                                <div className="flex-[2] relative">
                                                    <input 
                                                        type={secret.isVisible ? "text" : "password"} 
                                                        className="w-full bg-gray-50 group-hover:bg-white border border-transparent group-hover:border-gray-100 rounded-lg px-3 py-2 text-vn-text font-mono text-sm focus:bg-white focus:border-vn-primary focus:ring-2 focus:ring-red-50 focus:outline-none transition-all" 
                                                        value={secret.value} 
                                                        onChange={(e) => handleUpdateSecret(secret.id, 'value', e.target.value)} 
                                                    />
                                                </div>

                                                <div className="flex items-center gap-2 self-end md:self-auto">
                                                    <button onClick={() => toggleSecretVisibility(secret.id)} className={`p-2 rounded-lg transition-colors ${secret.isVisible ? 'bg-orange-50 text-orange-500' : 'text-gray-400 hover:text-vn-text hover:bg-gray-100'}`} title="Show/Hide">{secret.isVisible ? <EyeOff className="w-4 h-4" /> : <Eye className="w-4 h-4" />}</button>
                                                    <button onClick={() => copyToClipboard(secret.value)} className="p-2 text-gray-400 hover:text-vn-primary hover:bg-red-50 rounded-lg transition-colors" title="Copy"><Copy className="w-4 h-4" /></button>
                                                    <button onClick={() => handleDeleteSecret(secret.id)} className="p-2 text-gray-400 hover:text-vn-danger hover:bg-red-50 rounded-lg transition-colors" title="Delete"><Trash2 className="w-4 h-4" /></button>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Import Modal */}
                    {isImportModalOpen && (
                        <div className="absolute inset-0 bg-vn-dark/20 backdrop-blur-sm flex items-center justify-center p-6 z-50 animate-in fade-in duration-200">
                            <div className="bg-white border border-gray-200 rounded-2xl shadow-2xl w-full max-w-2xl flex flex-col max-h-[80vh] overflow-hidden transform transition-all scale-100">
                                <div className="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                                    <h2 className="text-lg font-bold text-vn-text flex items-center gap-2"><Upload className="w-5 h-5 text-vn-primary" /> Import .env</h2>
                                    <button onClick={() => setIsImportModalOpen(false)} className="text-gray-400 hover:text-vn-text transition-colors"><X className="w-5 h-5" /></button>
                                </div>
                                <div className="p-6 flex-1 flex flex-col min-h-0">
                                    <p className="text-sm text-gray-500 mb-4">Paste your environment variables below. Comments (#) will be ignored.</p>
                                    <textarea 
                                        className="flex-1 w-full bg-gray-50 border border-gray-200 rounded-xl p-4 font-mono text-sm text-vn-text focus:outline-none focus:border-vn-primary focus:ring-4 focus:ring-red-50 resize-none transition-all" 
                                        placeholder="API_KEY=12345&#10;DB_HOST=localhost" 
                                        value={importContent} 
                                        onChange={(e) => setImportContent(e.target.value)} 
                                    />
                                </div>
                                <div className="p-6 border-t border-gray-100 flex justify-end gap-3 bg-gray-50/50">
                                    <button onClick={() => setIsImportModalOpen(false)} className="px-5 py-2.5 rounded-xl text-gray-500 hover:bg-white hover:shadow-sm border border-transparent hover:border-gray-200 transition-all text-sm font-medium">Cancel</button>
                                    <button onClick={handleImportSubmit} className="px-5 py-2.5 rounded-xl bg-vn-primary text-white hover:bg-vn-primaryHover shadow-lg shadow-orange-200 hover:shadow-xl transition-all text-sm font-medium">Import Secrets</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Toast */}
                    {toast && (
                        <div className={`fixed bottom-8 right-8 px-6 py-3.5 rounded-xl shadow-2xl flex items-center gap-3 animate-in slide-in-from-bottom-10 fade-in duration-300 z-50 ${toast.type === 'error' ? 'bg-vn-danger text-white' : 'bg-vn-text text-white'}`}>
                            {toast.type === 'error' ? <X className="w-5 h-5" /> : <Check className="w-5 h-5 text-green-400" />}
                            <span className="font-medium text-sm">{toast.msg}</span>
                        </div>
                    )}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<EnvironmentManager />);
    </script>
</body>
</html>
