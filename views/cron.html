<div class="max-w-7xl mx-auto space-y-8">
    
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4 animate-fade-in-up">
        <div>
            <h2 class="text-3xl font-bold text-vn-dark tracking-tight">Scheduler</h2>
            <p class="text-gray-500 mt-1">Automate system maintenance and recurring tasks.</p>
        </div>
        <button onclick="document.getElementById('cron-form').classList.toggle('hidden')" 
                class="flex items-center gap-2 px-6 py-2.5 bg-vn-primary hover:bg-orange-700 text-white rounded-xl shadow-lg shadow-orange-200 transition-all hover:-translate-y-0.5 active:translate-y-0 text-sm font-medium">
            <i class="ph-bold ph-plus text-lg"></i> Add Task
        </button>
    </div>

    <!-- Add Job Form (Hidden by default) -->
    <div id="cron-form" class="hidden bg-white border border-vn-border rounded-2xl shadow-soft p-8 animate-fade-in">
        <div class="flex items-center gap-3 mb-6 border-b border-vn-border pb-4 bg-gray-50/50 -mx-8 -mt-8 px-8 pt-6 rounded-t-2xl">
            <div class="w-10 h-10 rounded-xl bg-orange-50 flex items-center justify-center text-orange-600 shadow-sm border border-orange-100">
                <i class="ph-fill ph-clock text-xl"></i>
            </div>
            <div>
                <h3 class="font-bold text-vn-dark">New Scheduled Task</h3>
                <p class="text-xs text-gray-500">Define a cron expression and command.</p>
            </div>
        </div>

        <form hx-post="/api/cron/create" hx-target="#cron-list" hx-swap="innerHTML"
              hx-on::after-request="this.reset(); document.getElementById('cron-form').classList.add('hidden')"
              class="grid grid-cols-1 md:grid-cols-4 gap-6 items-end">
            
            <div class="md:col-span-1">
                <label class="block text-xs font-bold text-vn-dark mb-2">Schedule Expression</label>
                <div class="relative">
                    <input type="text" name="schedule" placeholder="* * * * *" value="0 * * * *" required
                           class="w-full pl-4 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl text-vn-dark focus:border-vn-primary focus:ring-4 focus:ring-red-500/10 outline-none transition-all font-mono text-sm placeholder-gray-400">
                </div>
                <div class="flex gap-2 mt-2 text-[10px] text-gray-400 font-mono">
                    <span>Min</span> <span>Hour</span> <span>Day</span> <span>Month</span> <span>Week</span>
                </div>
            </div>

            <div class="md:col-span-2">
                <label class="block text-xs font-bold text-vn-dark mb-2">Command to Execute</label>
                <input type="text" name="command" placeholder="php /var/www/html/site/artisan schedule:run" required
                       class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-xl text-vn-dark focus:border-vn-primary focus:ring-4 focus:ring-red-500/10 outline-none transition-all font-mono text-sm placeholder-gray-400">
            </div>

            <div class="md:col-span-1">
                <button type="submit" class="w-full flex items-center justify-center gap-2 px-6 py-2.5 bg-vn-dark hover:bg-gray-800 text-white rounded-xl shadow-lg shadow-gray-200 transition-all hover:-translate-y-0.5 active:translate-y-0 text-sm font-medium">
                    <i class="ph-bold ph-floppy-disk text-lg"></i>
                    <span>Save Task</span>
                </button>
            </div>
        </form>
    </div>

    <!-- Jobs List -->
    <div class="bg-white border border-vn-border rounded-2xl shadow-soft overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50/50 border-b border-vn-border">
                    <tr>
                        <th class="px-6 py-4 text-[11px] font-bold text-gray-400 uppercase tracking-wider">Schedule</th>
                        <th class="px-6 py-4 text-[11px] font-bold text-gray-400 uppercase tracking-wider">Command</th>
                        <th class="px-6 py-4 text-[11px] font-bold text-gray-400 uppercase tracking-wider text-right">Action</th>
                    </tr>
                </thead>
                <tbody id="cron-list" class="divide-y divide-vn-border text-sm">
                    {{ template "partials/cron_rows" . }}
                </tbody>
            </table>
        </div>
    </div>
</div>
